
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VozDeFeAAP - Chat Bíblico</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<header>
    <h1>📖 VozDeFeAAP</h1>
    <p>Chat Bíblico de Fe y Esperanza</p>

    <nav class="menu">
        <button onclick="mostrarSeccion('inicio')">🏠 Inicio</button>
        <button onclick="mostrarSeccion('chat')">💬 Chat Bíblico</button>
        <button onclick="mostrarSeccion('historias')">📚 Historias Bíblicas</button>
        <button onclick="mostrarSeccion('reflexion')">✨ Reflexión del Día</button>
        <button onclick="mostrarSeccion('versiculo')">📖 Versículo del Día</button>
        <button onclick="mostrarSeccion('acerca')">ℹ️ Acerca</button>
    </nav>

</header>

<div class="chat-container">

    <div id="chat-box">
        <div class="bot-message">
            🙏 Bienvenido a VozDeFeAAP.<br><br>
            Puedes preguntarme sobre historias de la Biblia,
            personajes bíblicos, versículos y enseñanzas de Jesucristo.
        </div>
    </div>


    <div class="input-area">
        <input 
        type="text" 
        id="user-input" 
        placeholder="Escribe tu pregunta bíblica...">

        <button onclick="sendMessage()">
            Enviar
        </button>
    </div>

</div>


<footer>
    𓂀 OSCAR AYALA
</footer>


<script src="app.js"></script>

</body>
</html>
